<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
</head>
<body>

<h1>Resume Analysis Result</h1>

<h2>Score: {{ score }}%</h2>

<h3>Skills Found</h3>
<ul>
{% for skill in skills %}
<li>{{ skill }}</li>
{% endfor %}
</ul>

<h3>Missing Skills</h3>
<ul>
{% for skill in missing %}
<li>{{ skill }}</li>
{% endfor %}
</ul>

</body>
</html>
